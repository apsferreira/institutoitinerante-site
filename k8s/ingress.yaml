# IngressRoute Traefik para institutoitinerante.com.br (+ www)
# TLS via Cloudflare Tunnel — sem cert-manager nem secretName necessários
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: iit-website
  namespace: iit-website
  labels:
    app: iit-website
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`institutoitinerante.com.br`) || Host(`www.institutoitinerante.com.br`)
      kind: Rule
      middlewares:
        - name: redirect-www
        - name: security-headers
      services:
        - name: iit-website
          port: 80
