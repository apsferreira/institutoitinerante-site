# IngressRoute Traefik para stg.institutoitinerante.com.br
# TLS via Cloudflare Tunnel — sem cert-manager necessário
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: iit-website-staging
  namespace: iit-website-staging
  labels:
    app: iit-website
    app.kubernetes.io/managed-by: argocd
    environment: staging
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`stg.institutoitinerante.com.br`)
      kind: Rule
      services:
        - name: iit-website
          port: 80
