# Ingress para stg.institutoitinerante.com.br
# Usa letsencrypt-staging para evitar rate limit durante testes
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iit-website
  namespace: iit-website-staging
  labels:
    app: iit-website
    app.kubernetes.io/managed-by: argocd
    environment: staging
  annotations:
    # letsencrypt-staging: não tem rate limit mas o cert não é trusted pelo browser
    # Trocar para letsencrypt-prod só quando o staging estiver estável
    cert-manager.io/cluster-issuer: letsencrypt-staging

    # Traefik ingress controller annotations
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt

    # Staging: apenas security headers (sem redirect www)
    traefik.ingress.kubernetes.io/router.middlewares: iit-website-staging-security-headers-staging@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - stg.institutoitinerante.com.br
      secretName: iit-website-staging-tls
  rules:
    - host: stg.institutoitinerante.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iit-website
                port:
                  name: http
